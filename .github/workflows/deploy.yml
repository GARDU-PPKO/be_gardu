name: Deploy Gardu API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            echo "=================================="
            echo "Deploy started: $(date)"
            echo "=================================="

            cd /home/ilhama/be_gardu

            echo "Pull latest code..."
            git fetch origin
            git reset --hard origin/main

            echo "Run migration..."
            docker exec gardu-api php artisan migrate --force
            
            echo "Clear cache..."
            docker exec gardu-api php artisan optimize:clear

            echo "Optimize application..."
            docker exec gardu-api php artisan optimize

            echo "=================================="
            echo "Deploy success!"
            echo "=================================="
